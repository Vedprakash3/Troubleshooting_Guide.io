<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Projects Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #FFFFE0;
        }
        h1 {
            color: #333;
            position: relative;
            top: -40px;
            font-size: 24px;
        }
        p {
            margin-top: -10px;
            font-size: 16px;
        }

        /* Search Bar */
        #searchBar {
            width: 60%;
            padding: 10px;
            font-size: 16px;
            margin: 20px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

<h1>Welcome to visit Troubleshooting Guide 🔧</h1>
<p>Click on the buttons below to download the image in png</p>

<!-- Search Bar -->
<input type="text" id="searchBar" placeholder="Search projects..." onkeyup="searchProjects()">

<div class="btn-container" id="projectList">
       <button class="btn" onclick="window.open('https://vedprakash3.github.io/Motorcycle_Troubleshooting.io/', '_blank')">Motorcycle 🔧</button>
        <button class="btn" onclick="window.open('https://vedprakash3.github.io/IP_Camera-Troubleshooting_Guide/', '_blank')">IP Camera 🔧</button>


</div>
<script>
    function searchProjects() {
        let input = document.getElementById("searchBar").value.toLowerCase();
        let buttons = document.getElementById("projectList").getElementsByTagName("button");

        for (let i = 0; i < buttons.length; i++) {
            let text = buttons[i].innerText.toLowerCase();
            if (text.includes(input)) {
                buttons[i].style.display = "block";
            } else {
                buttons[i].style.display = "none";
            }
        }
    }
</script>

</body>
</html>
